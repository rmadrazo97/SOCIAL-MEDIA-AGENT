app = 'sma-backend'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8000"
  INSTAGRAM_MEDIA_DIR = "/data/media"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "sma_media"
  destination = "/data/media"

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/health"
    interval = "30s"
    timeout = "5s"
