app = 'sma-frontend'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  BACKEND_URL = "http://sma-backend.internal:8000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/"
    interval = "30s"
    timeout = "5s"
